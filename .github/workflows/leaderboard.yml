name: Update Contribution Leaderboard

permissions:
  contents: write

on:
  # Jalankan setiap push ke main KECUALI commit dari bot
  push:
    branches:
      - main
  # Jalankan saat PR di-merge
  pull_request:
    types: [closed]
  # Jadwal otomatis (misal: tiap hari jam 00:00 UTC)
  schedule:
    - cron: "0 0 * * *"
  # Bisa dijalankan manual dari tab Actions
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-24.04

    # ── Guard 1: skip kalau PR belum di-merge ──────────────────────────────
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.merged == true

    # ── Guard 2: skip kalau commit berasal dari bot (cegah infinite loop) ─
    # Dicek di step level supaya bisa pakai `contains()`
    steps:
      - name: Skip bot commits
        if: |
          github.event_name == 'push' &&
          contains(github.event.head_commit.message, 'chore: update contribution leaderboard')
        run: |
          echo "Commit dari bot — skip job."
          exit 0

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_REPO_PAT }}
          # Ambil full history supaya rebase tidak gagal
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install requests

      - name: Run Leaderboard Script
        id: leaderboard
        env:
          GH_TOKEN: ${{ secrets.MY_REPO_PAT }}
        run: python update_leaderboard.py

      # Hanya commit & push kalau ada perubahan nyata
      - name: Commit and Push Changes
        if: steps.leaderboard.outputs.changed == 'true'
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "chore: update contribution leaderboard"
          git pull --rebase origin main
          git push origin main
